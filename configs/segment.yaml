track: SEGMENT
dataset: heico
split: train

model:
  name: Qwen/Qwen2-VL-7B-Instruct
  dtype: bfloat16
  device: cuda

video:
  frame_sample_strategy: uniform   # options: uniform, keyframe, dense
  max_frames: 16                    # keep low — 15sec budget is tight
  fps_override: null                # null = use video fps

inference:
  max_new_tokens: 64
  temperature: 0.0
  batch_size: 1
  time_budget_sec: 15

prompt:
  system: >
    You are a surgical AI assistant analyzing short laparoscopic video clips.
    Answer questions about foreign objects and surgical events concisely.
  use_metadata: true
  use_few_shot: false

logging:
  output_dir: results/segment
  save_responses: true
